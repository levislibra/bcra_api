services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      bcra_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user_bcra:bcra1234@bcra_db:5432/bcra_deudores
      SECRET_TOKEN: "1234"
      VIRTUAL_HOST: bcra.cloudlibrasoft.com
      LETSENCRYPT_HOST: bcra.cloudlibrasoft.com
      LETSENCRYPT_EMAIL: levislibra@libra-soft.com
      VIRTUAL_PORT: "80"
    mem_limit: 2g
    mem_reservation: 2g
    networks:
      - backend
      - proxy

  bcra_db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_bcra
      POSTGRES_PASSWORD: bcra1234
      POSTGRES_DB: bcra_deudores
    command:
      - postgres
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=64MB
      - -c
      - min_wal_size=2GB
      - -c
      - max_wal_size=8GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_bcra -d bcra_deudores"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 1g
    mem_reservation: 1g
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
  proxy:
    external: true
    name: proxy
